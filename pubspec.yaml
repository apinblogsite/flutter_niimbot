name: flutter_niimbot
description: Flutter library for BLE printing with NIIMBOT thermal printers. Supports 85+ printer models with automatic detection and rich content rendering.
version: 2.0.0
homepage: https://github.com/apinblogsite/flutter_niimbot
repository: https://github.com/apinblogsite/flutter_niimbot

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^2.2.1
  http: ^1.6.0
  image: ^4.7.1
  qr: ^3.0.2
  barcode: ^2.2.9
  synchronized: ^3.4.0
  crypto: ^3.0.7
  pluto_grid: ^8.1.0
  cloud_firestore: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
